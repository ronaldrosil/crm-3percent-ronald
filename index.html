<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>3% CRM Ronald</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

h1{
color:#3b82f6;
}

button{
border:none;
padding:12px;
color:white;
font-size:16px;
border-radius:8px;
margin:6px;
cursor:pointer;
}

.btnAjouter{background:#f97316;}
.btnTous{background:#3b82f6;}
.btnRappels{background:#22c55e;}
.btnWhatsapp{background:#25D366;}

.carte{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:15px;
}

#formulaire{
display:none;
margin-top:20px;
}

input, textarea, select{
width:80%;
padding:10px;
margin:8px;
border-radius:8px;
border:none;
}

</style>

</head>

<body>

<h1>3% CRM Ronald</h1>

<button class="btnAjouter" onclick="ouvrirFormulaire()">Ajouter</button>
<button class="btnTous" onclick="voirProspects()">Tous</button>
<button class="btnRappels" onclick="voirRappels()">Rappels</button>

<div id="formulaire">

<h2>Nouveau prospect</h2>

<input id="nom" placeholder="Nom">

<br>

<input id="telephone" placeholder="Téléphone">

<br>

<textarea id="notes" placeholder="Notes"></textarea>

<br>

<select id="pipeline">
<option value="prospect">Prospect</option>
<option value="client">Client</option>
<option value="partenaire">Partenaire</option>
</select>

<br>

<input id="action_prochaine" placeholder="Prochaine action">

<br>

<input type="date" id="date_rappel">

<br>

<button onclick="enregistrerProspect()">Enregistrer</button>

</div>

<h2>Prospects</h2>

<div id="listeProspects"></div>

<h2>Rappels du jour</h2>

<div id="listeRappels"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://xocsmlqmplnmpcfqrnmz.supabase.co"
const supabaseKey = "sb_publishable_kQ2NDobwMT9rfJYPYtY0bw_9ZKnf9MU"

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey)

function ouvrirFormulaire(){
document.getElementById("formulaire").style.display="block"
}

async function enregistrerProspect(){

const nom = document.getElementById("nom").value
const telephone = document.getElementById("telephone").value
const notes = document.getElementById("notes").value
const pipeline = document.getElementById("pipeline").value
const action_prochaine = document.getElementById("action_prochaine").value
const date_rappel = document.getElementById("date_rappel").value

const { error } = await supabaseClient
.from("contacts")
.insert([
{
nom: nom,
telephone: telephone,
notes: notes,
pipeline: pipeline,
action_prochaine: action_prochaine,
date_rappel: date_rappel
}
])

if(error){
alert("Erreur : " + error.message)
}else{

alert("Prospect enregistré")

document.getElementById("nom").value=""
document.getElementById("telephone").value=""
document.getElementById("notes").value=""

voirProspects()

}

}

async function voirProspects(){

const { data, error } = await supabaseClient
.from("contacts")
.select("*")
.order("created_at",{ascending:false})

if(error){
console.log(error)
return
}

let zone = document.getElementById("listeProspects")
zone.innerHTML=""

data.forEach(p => {

zone.innerHTML += `

<div class="carte">

<strong>${p.nom}</strong><br>

📞 ${p.telephone}<br>

Pipeline : ${p.pipeline || ""}<br>

Action : ${p.action_prochaine || ""}<br>

📅 Rappel : ${p.date_rappel || ""}<br>

<button class="btnWhatsapp"
onclick="envoyerWhatsapp('${p.telephone}','Bonjour ${p.nom}')">

WhatsApp

</button>

</div>

`

})

}

async function voirRappels(){

const aujourdHui = new Date().toISOString().split('T')[0]

const { data, error } = await supabaseClient
.from("contacts")
.select("*")
.eq("date_rappel", aujourdHui)

if(error){
console.log(error)
return
}

let zone = document.getElementById("listeRappels")
zone.innerHTML=""

data.forEach(p => {

zone.innerHTML += `

<div class="carte">

<strong>${p.nom}</strong><br>

📞 ${p.telephone}<br>

Action : ${p.action_prochaine || ""}

</div>

`

})

}

function envoyerWhatsapp(numero,message){

numero = numero.replace(/\D/g,'')

window.open(
"https://wa.me/"+numero+"?text="+encodeURIComponent(message),
"_blank"
)

}

voirProspects()

</script>

</body>
</html>
