<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>3% CRM par Ronald</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

h1{
color:#3b82f6;
}

button{
background:#f97316;
border:none;
padding:10px;
color:white;
border-radius:8px;
margin:6px;
cursor:pointer;
}

.carte{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:15px;
cursor:pointer;
}

.retard{border-left:8px solid red;}
.aujourdhui{border-left:8px solid orange;}
.futur{border-left:8px solid green;}

#formulaire{
display:none;
margin-top:20px;
}

#fiche{
display:none;
margin-top:20px;
}

input,textarea,select{
width:80%;
padding:10px;
margin:8px;
border-radius:6px;
border:none;
}

.interaction{
background:#0f172a;
padding:10px;
border-radius:6px;
margin-top:6px;
font-size:14px;
}

</style>
</head>

<body>

<h1>3% CRM par Ronald</h1>

<div class="carte">

<p>CRM intelligent de prospection</p>

<button onclick="ouvrirFormulaire()">Ajouter prospect</button>
<button onclick="chargerProspects()">Tous les prospects</button>
<button onclick="voirRappels()">Rappels du jour</button>

</div>

<div id="formulaire">

<h2>Prospect</h2>

<input id="nom" placeholder="Nom"><br>
<input id="telephone" placeholder="Téléphone"><br>

<textarea id="note" placeholder="Note"></textarea><br>

<button onclick="toggleDictation()">🎤 Dicter</button>

<br>

<label>Pipeline</label>

<select id="pipeline">
<option value="business">Business</option>
<option value="produit">Produit</option>
</select>

<br>

<label>Etape</label>

<select id="etape">
<option value="prospection">Prospection</option>
<option value="contact">Contact</option>
<option value="appel">Appel</option>
<option value="presentation">Présentation</option>
<option value="relance">Relance</option>
<option value="balance_test">Balance test</option>
<option value="test_produit">Test produit</option>
<option value="suivi">Suivi</option>
</select>

<br>

<input id="action_prochaine" placeholder="Prochaine action"><br>
<input type="date" id="date_rappel"><br>

<button onclick="enregistrerProspect()">Enregistrer</button>

</div>

<div id="fiche"></div>

<h2>Prospects</h2>
<div id="listeProspects"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl="https://xocsmlqmplnmpcfqrnmz.supabase.co"
const supabaseKey="sb_publishable_kQ2NDobwMT9rfJYPYtY0bw_9ZKnf9MU"

const supabaseClient=supabase.createClient(supabaseUrl,supabaseKey)

let prospectEnEdition=null
let recognition=null
let enregistrementActif=false

function ouvrirFormulaire(){

document.getElementById("formulaire").style.display="block"

document.getElementById("nom").value=""
document.getElementById("telephone").value=""
document.getElementById("note").value=""
document.getElementById("pipeline").value="business"
document.getElementById("etape").value="prospection"
document.getElementById("action_prochaine").value=""
document.getElementById("date_rappel").value=""

prospectEnEdition=null

}

function toggleDictation(){

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition

if(!SpeechRecognition){
alert("Dictée non supportée")
return
}

if(!recognition){

recognition=new SpeechRecognition()
recognition.lang="fr-FR"
recognition.continuous=true

recognition.onresult=function(event){

const texte=event.results[event.results.length-1][0].transcript

const zone=document.getElementById("note")

zone.value=zone.value+" "+texte

}

}

if(enregistrementActif){

recognition.stop()
enregistrementActif=false

}else{

recognition.start()
enregistrementActif=true

}

}

async function enregistrerProspect(){

const nom=document.getElementById("nom").value
const telephone=document.getElementById("telephone").value
const note=document.getElementById("note").value
const pipeline=document.getElementById("pipeline").value
const etape=document.getElementById("etape").value
const action=document.getElementById("action_prochaine").value

let date=document.getElementById("date_rappel").value
if(!date){date=null}

if(prospectEnEdition){

const {error}=await supabaseClient
.from("contacts")
.update({
nom,
telephone,
notes:note,
pipeline,
etape,
action_prochaine:action,
date_rappel:date
})
.eq("id",prospectEnEdition)

if(error){alert(error.message);return}

await enregistrerInteraction(prospectEnEdition,note)

}else{

const {data,error}=await supabaseClient
.from("contacts")
.insert([{
nom,
telephone,
notes:note,
pipeline,
etape,
action_prochaine:action,
date_rappel:date
}])
.select()

if(error){alert(error.message);return}

await enregistrerInteraction(data[0].id,note)

}

chargerProspects()

}

async function enregistrerInteraction(contactId,note){

await supabaseClient
.from("interactions")
.insert([{
contact_id:contactId,
note:note,
date_interaction:new Date().toISOString()
}])

}

async function chargerProspects(){

const {data,error}=await supabaseClient
.from("contacts")
.select("*")

if(error){console.log(error);return}

const zone=document.getElementById("listeProspects")
zone.innerHTML=""

const aujourd=new Date().toISOString().split('T')[0]

data.forEach(prospect=>{

let classe="futur"

if(prospect.date_rappel){

if(prospect.date_rappel<aujourd){classe="retard"}
else if(prospect.date_rappel===aujourd){classe="aujourdhui"}

}

zone.innerHTML+=`

<div class="carte ${classe}" onclick="ouvrirFiche('${prospect.id}')">

<strong>${prospect.nom}</strong><br>

📞 ${prospect.telephone}<br>

Pipeline : ${prospect.pipeline || ""}<br>

Etape : ${prospect.etape || ""}<br>

Action : ${prospect.action_prochaine || ""}<br>

📅 Rappel : ${prospect.date_rappel || ""}<br>

${prospect.notes || ""}

<br><br>

<button onclick="event.stopPropagation();modifierProspect('${prospect.id}')">Modifier</button>

<button onclick="event.stopPropagation();actionFaite('${prospect.id}')">Action faite</button>

<a onclick="event.stopPropagation();" href="https://wa.me/${prospect.telephone}" target="_blank">
<button style="background:#25D366">WhatsApp</button>
</a>

</div>

`

})

}

async function ouvrirFiche(id){

const {data:prospect}=await supabaseClient
.from("contacts")
.select("*")
.eq("id",id)
.single()

const {data:interactions}=await supabaseClient
.from("interactions")
.select("*")
.eq("contact_id",id)
.order("date_interaction",{ascending:false})

let html=`

<div class="carte">

<h2>${prospect.nom}</h2>

📞 ${prospect.telephone}<br>
Pipeline : ${prospect.pipeline}<br>
Etape : ${prospect.etape}<br>

<h3>Historique</h3>

`

interactions.forEach(i=>{

const date=new Date(i.date_interaction).toLocaleDateString()

html+=<div class="interaction">${date} — ${i.note}</div>

})

html+=</div>

document.getElementById("fiche").innerHTML=html
document.getElementById("fiche").style.display="block"

window.scrollTo(0,0)

}

async function modifierProspect(id){

const {data}=await supabaseClient
.from("contacts")
.select("*")
.eq("id",id)
.single()

prospectEnEdition=id

document.getElementById("formulaire").style.display="block"

document.getElementById("nom").value=data.nom
document.getElementById("telephone").value=data.telephone
document.getElementById("note").value=data.notes || ""
document.getElementById("pipeline").value=data.pipeline || "business"
document.getElementById("etape").value=data.etape || "prospection"
document.getElementById("action_prochaine").value=data.action_prochaine || ""
document.getElementById("date_rappel").value=data.date_rappel || ""

}

async function actionFaite(id){

const nouvelleDate=new Date()
nouvelleDate.setDate(nouvelleDate.getDate()+3)

const date=nouvelleDate.toISOString().split('T')[0]

await supabaseClient
.from("contacts")
.update({
action_prochaine:"Relancer",
date_rappel:date
})
.eq("id",id)

await enregistrerInteraction(id,"Action faite - relance programmée")

chargerProspects()

}

async function voirRappels(){

const aujourd=new Date().toISOString().split('T')[0]

const {data}=await supabaseClient
.from("contacts")
.select("*")
.eq("date_rappel",aujourd)

const zone=document.getElementById("listeProspects")
zone.innerHTML=""

data.forEach(p=>{

zone.innerHTML+=`

<div class="carte aujourdhui">

<strong>${p.nom}</strong><br>
📞 ${p.telephone}<br>
Pipeline : ${p.pipeline}<br>
Etape : ${p.etape}<br>
Action : ${p.action_prochaine}<br>

</div>

`

})

}

chargerProspects()

</script>

</body>
</html>
