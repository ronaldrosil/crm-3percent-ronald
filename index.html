<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>3% CRM by Ronald</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

h1{
color:#3b82f6;
}

button{
background:#f97316;
border:none;
padding:12px;
color:white;
font-size:16px;
border-radius:8px;
margin:6px;
cursor:pointer;
}

.carte{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:20px;
}

#formulaire{
display:none;
margin-top:20px;
}

input, textarea{
width:80%;
padding:10px;
margin:8px;
border-radius:8px;
border:none;
}

</style>

</head>

<body>

<h1>3% CRM par Ronald</h1>

<div class="carte">

<p>Bienvenue dans ton CRM intelligent</p>

<button onclick="ouvrirFormulaire()">Ajouter un prospect</button>
<button onclick="chargerProspects()">Voir tous les prospects</button>
<button onclick="voirRappels()">Voir rappels du jour</button>

</div>


<div id="formulaire">

<h2>Nouveau prospect</h2>

<input id="nom" placeholder="Nom">

<br>

<input id="telephone" placeholder="Téléphone">

<br>

<textarea id="note" placeholder="Note"></textarea>

<br>

<input id="pipeline" placeholder="Pipeline (business / produit / partenaire)">

<br>

<input id="etape" placeholder="Étape">

<br>

<input id="action_prochaine" placeholder="Prochaine action">

<br>

<input type="date" id="date_rappel">

<br>

<button onclick="enregistrerProspect()">Enregistrer</button>

</div>


<h2>Liste des prospects</h2>

<div id="listeProspects"></div>

<h2>Fiche contact</h2>

<div id="ficheContact"></div>

<h2>Rappels du jour</h2>

<div id="listeRappels"></div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://xocsmlqmplnmpcfqrnmz.supabase.co"
const supabaseKey = "sb_publishable_kQ2NDobwMT9rfJYPYtY0bw_9ZKnf9MU"

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey)



function ouvrirFormulaire(){
document.getElementById("formulaire").style.display="block";
}



async function enregistrerProspect(){

const nom = document.getElementById("nom").value
const telephone = document.getElementById("telephone").value
const note = document.getElementById("note").value
const pipeline = document.getElementById("pipeline").value
const etape = document.getElementById("etape").value
const action_prochaine = document.getElementById("action_prochaine").value
const date_rappel = document.getElementById("date_rappel").value


const { data, error } = await supabaseClient
.from("contacts")
.insert([
{
nom: nom,
telephone: telephone,
notes: note,
pipeline: pipeline,
etape: etape,
action_prochaine: action_prochaine,
date_rappel: date_rappel
}
])

if(error){

alert("Erreur : " + error.message)

}else{

alert("Prospect enregistré")

chargerProspects()

}

}



async function ajouterInteraction(contactId, texte){

const { data, error } = await supabaseClient
.from("interactions")
.insert([
{
contact_id: contactId,
note: texte
}
])

}



async function chargerProspects(){

const { data, error } = await supabaseClient
.from("contacts")
.select("*")
.order("created_at", { ascending: false })

if(error){
console.log(error)
return
}

let zone = document.getElementById("listeProspects")

zone.innerHTML = ""

data.forEach(prospect => {

zone.innerHTML += `

<div class="carte">

<strong>${prospect.nom}</strong><br>

📞 ${prospect.telephone}<br>

Pipeline : ${prospect.pipeline || ""}<br>
Étape : ${prospect.etape || ""}<br>

<button onclick="ouvrirFicheContact('${prospect.id}')">
Voir fiche
</button>

</div>

`

})

}



async function ouvrirFicheContact(contactId){

const { data: contact } = await supabaseClient
.from("contacts")
.select("*")
.eq("id", contactId)
.single()


const { data: interactions } = await supabaseClient
.from("interactions")
.select("*")
.eq("contact_id", contactId)
.order("date_interaction", { ascending: false })


let historique = ""

interactions.forEach(interaction => {

historique += `
<div class="carte">
📅 ${new Date(interaction.date_interaction).toLocaleString()} <br>
${interaction.note}
</div>
`

})


document.getElementById("ficheContact").innerHTML = `

<div class="carte">

<h2>${contact.nom}</h2>

📞 ${contact.telephone}<br><br>

Pipeline : ${contact.pipeline || ""}<br>
Étape : ${contact.etape || ""}<br>
Action : ${contact.action_prochaine || ""}<br>
Rappel : ${contact.date_rappel || ""}<br><br>

<h3>Historique</h3>

${historique}

</div>

`

}



async function voirRappels(){

const aujourdHui = new Date().toISOString().split('T')[0]

const { data } = await supabaseClient
.from("contacts")
.select("*")
.eq("date_rappel", aujourdHui)

let zone = document.getElementById("listeRappels")

zone.innerHTML = ""

data.forEach(prospect => {

zone.innerHTML += `

<div class="carte">

<strong>${prospect.nom}</strong><br>

📞 ${prospect.telephone}<br>

Action : ${prospect.action_prochaine || ""}<br>
📅 ${prospect.date_rappel || ""}

</div>

`

})

}



chargerProspects()

</script>

</body>
</html>
