<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<title>3% CRM by Ronald</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

h1{
color:#3b82f6;
}

button{
background:#f97316;
border:none;
padding:12px;
color:white;
border-radius:8px;
margin:6px;
cursor:pointer;
}

.carte{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:15px;
}

.retard{
border-left:8px solid red;
}

.aujourdhui{
border-left:8px solid orange;
}

.futur{
border-left:8px solid green;
}

#formulaire{
display:none;
margin-top:20px;
}

input,textarea{
width:80%;
padding:10px;
margin:8px;
border-radius:6px;
border:none;
}

</style>

</head>

<body>

<h1>3% CRM par Ronald</h1>

<div class="carte">

<p>CRM intelligent de prospection</p>

<button onclick="ouvrirFormulaire()">Ajouter prospect</button>

<button onclick="chargerProspects()">Tous les prospects</button>

<button onclick="voirRappels()">Rappels du jour</button>

</div>


<div id="formulaire">

<h2>Nouveau prospect</h2>

<input id="nom" placeholder="Nom">

<br>

<input id="telephone" placeholder="Téléphone">

<br>

<textarea id="note" placeholder="Note"></textarea>

<br>

<input id="action_prochaine" placeholder="Prochaine action">

<br>

<input type="date" id="date_rappel">

<br>

<button onclick="enregistrerProspect()">Enregistrer</button>

</div>


<h2>Prospects</h2>

<div id="listeProspects"></div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl="https://xocsmlqmplnmpcfqrnmz.supabase.co"

const supabaseKey="sb_publishable_kQ2NDobwMT9rfJYPYtY0bw_9ZKnf9MU"

const supabaseClient=window.supabase.createClient(supabaseUrl,supabaseKey)



function ouvrirFormulaire(){

document.getElementById("formulaire").style.display="block"

}



async function enregistrerProspect(){

const nom=document.getElementById("nom").value

const telephone=document.getElementById("telephone").value

const note=document.getElementById("note").value

const action=document.getElementById("action_prochaine").value

const date=document.getElementById("date_rappel").value


const{error}=await supabaseClient

.from("contacts")

.insert([

{

nom:nom,

telephone:telephone,

notes:note,

action_prochaine:action,

date_rappel:date

}

])


if(error){

alert(error.message)

}else{

alert("Prospect enregistré")

chargerProspects()

}

}



async function chargerProspects(){

const{data,error}=await supabaseClient

.from("contacts")

.select("*")


if(error){

console.log(error)

return

}


const zone=document.getElementById("listeProspects")

zone.innerHTML=""


data.forEach(prospect=>{


let classe="futur"


const aujourd=new Date().toISOString().split('T')[0]


if(prospect.date_rappel){

if(prospect.date_rappel<aujourd){

classe="retard"

}

else if(prospect.date_rappel===aujourd){

classe="aujourdhui"

}

}


zone.innerHTML+=`

<div class="carte ${classe}">

<strong>${prospect.nom}</strong><br>

📞 ${prospect.telephone}<br>

Action : ${prospect.action_prochaine||"non définie"}<br>

📅 Rappel : ${prospect.date_rappel||"non défini"}<br>

${prospect.notes||""}

<br><br>

<button onclick="modifierProspect('${prospect.id}')">Modifier</button>

</div>

`

})

}



async function modifierProspect(id){

const nom=prompt("Nouveau nom")

const tel=prompt("Nouveau téléphone")

const action=prompt("Nouvelle action")

const date=prompt("Nouvelle date rappel AAAA-MM-JJ")

const note=prompt("Nouvelle note")


const{error}=await supabaseClient

.from("contacts")

.update({

nom:nom,

telephone:tel,

action_prochaine:action,

date_rappel:date,

notes:note

})

.eq("id",id)


if(error){

alert("Erreur modification")

}else{

alert("Prospect modifié")

chargerProspects()

}

}



async function voirRappels(){

const aujourd=new Date().toISOString().split('T')[0]


const{data,error}=await supabaseClient

.from("contacts")

.select("*")

.eq("date_rappel",aujourd)


if(error){

console.log(error)

return

}


const zone=document.getElementById("listeProspects")

zone.innerHTML=""


data.forEach(prospect=>{

zone.innerHTML+=`

<div class="carte aujourdhui">

<strong>${prospect.nom}</strong><br>

📞 ${prospect.telephone}<br>

Action : ${prospect.action_prochaine||"non définie"}<br>

📅 Rappel : ${prospect.date_rappel||"non défini"}<br>

</div>

`

})

}



chargerProspects()

</script>

</body>

</html>
