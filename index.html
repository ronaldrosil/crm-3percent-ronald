<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>3% CRM by Ronald</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

h1{
color:#3b82f6;
}

button{
background:#f97316;
border:none;
padding:15px;
color:white;
font-size:18px;
border-radius:10px;
margin:10px;
}

.carte{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:20px;
}

#formulaire{
display:none;
margin-top:20px;
}

input, textarea{
width:80%;
padding:10px;
margin:10px;
border-radius:8px;
border:none;
}

</style>

</head>

<body>

<h1>3% CRM par Ronald</h1>

<div class="carte">

<p>Bienvenue dans ton CRM intelligent.</p>
<p>Version 1 en construction.</p>

<button onclick="ouvrirFormulaire()">Ajouter un prospect</button>

<button>Voir mes rappels</button>

<button>Assistant IA</button>

</div>


<div id="formulaire">

<h2>Nouveau prospect</h2>

<input id="nom" placeholder="Nom">

<br>

<input id="telephone" placeholder="Téléphone">

<br>

<textarea id="note" placeholder="Note"></textarea>

<br>

<button onclick="enregistrerProspect()">Enregistrer</button>

</div>


<script>

function ouvrirFormulaire(){
document.getElementById("formulaire").style.display="block";
}

function enregistrerProspect(){

let nom=document.getElementById("nom").value;
let telephone=document.getElementById("telephone").value;

alert("Prospect enregistré : "+nom+" "+telephone);

}

</script>

</body>
    </html>
