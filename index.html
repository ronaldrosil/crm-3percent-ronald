<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>3% CRM by Ronald</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

h1{
color:#3b82f6;
}

button{
background:#f97316;
border:none;
padding:15px;
color:white;
font-size:18px;
border-radius:10px;
margin:10px;
cursor:pointer;
}

.carte{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:20px;
}

#formulaire{
display:none;
margin-top:20px;
}

input, textarea{
width:80%;
padding:10px;
margin:10px;
border-radius:8px;
border:none;
}

</style>

</head>

<body>

<h1>3% CRM par Ronald</h1>

<div class="carte">

<p>Bienvenue dans ton CRM intelligent.</p>
<p>Version 1 en construction.</p>

<button onclick="ouvrirFormulaire()">Ajouter un prospect</button>

<button>Voir mes rappels</button>

<button>Assistant IA</button>

</div>


<div id="formulaire">

<h2>Nouveau prospect</h2>

<input id="nom" placeholder="Nom">

<br>

<input id="telephone" placeholder="Téléphone">

<br>

<textarea id="note" placeholder="Note"></textarea>

<br>
<input id="action_prochaine" placeholder="Prochaine action">
<br>
<button onclick="enregistrerProspect()">Enregistrer</button>

</div>
<h2>Liste des prospects</h2>

<div id="listeProspects"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://xocsmlqmplnmpcfqrnmz.supabase.co"
const supabaseKey = "sb_publishable_kQ2NDobwMT9rfJYPYtY0bw_9ZKnf9MU"

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey)


function ouvrirFormulaire(){
document.getElementById("formulaire").style.display="block";
}


async function enregistrerProspect(){

const nom = document.getElementById("nom").value
const telephone = document.getElementById("telephone").value
const note = document.getElementById("note").value


const { data, error } = await supabaseClient
.from("contacts")
.insert([
{
nom: nom,
telephone: telephone,
notes: note
}
])


if(error){

alert("Erreur : " + error.message)

}else{

alert("Prospect enregistré !")

document.getElementById("nom").value=""
document.getElementById("telephone").value=""
document.getElementById("note").value=""

}

}
async function chargerProspects() {

const { data, error } = await supabaseClient
.from("contacts")
.select("*")

if(error){
console.log(error)
return
}

let zone = document.getElementById("listeProspects")

zone.innerHTML = ""

data.forEach(prospect => {

zone.innerHTML += `
<div class="carte">

<strong>${prospect.nom}</strong><br>

📞 ${prospect.telephone}<br>

Statut : ${prospect.statut || "prospect"}<br>

Prochaine action : ${prospect.action_prochaine || "non définie"}<br>

${prospect.notes || ""}

</div>
`

})

}
chargerProspects()  
</script>

</body>
</html>
