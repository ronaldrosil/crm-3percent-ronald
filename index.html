<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>3% CRM by Ronald</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

h1{
color:#3b82f6;
}

button{
background:#f97316;
border:none;
padding:10px;
color:white;
border-radius:8px;
margin:6px;
cursor:pointer;
}

.carte{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:15px;
}

.retard{
border-left:8px solid red;
}

.aujourdhui{
border-left:8px solid orange;
}

.futur{
border-left:8px solid green;
}

#formulaire{
display:none;
margin-top:20px;
}

input,textarea,select{
width:80%;
padding:10px;
margin:8px;
border-radius:6px;
border:none;
}

</style>

</head>

<body>

<h1>3% CRM par Ronald</h1>

<div class="carte">

<p>CRM intelligent de prospection</p>

<button onclick="ouvrirFormulaire()">Ajouter prospect</button>

<button onclick="chargerProspects()">Tous les prospects</button>

<button onclick="voirRappels()">Rappels du jour</button>

</div>

<div id="formulaire">

<h2>Prospect</h2>

<input id="nom" placeholder="Nom">

<br>

<input id="telephone" placeholder="Téléphone">

<br>

<textarea id="note" placeholder="Note"></textarea>

<br>

<label>Pipeline</label>

<select id="pipeline">
<option value="business">Business</option>
<option value="produit">Produit</option>
</select>

<br>

<label>Étape</label>

<select id="etape">
<option value="prospection">Prospection</option>
<option value="contact">Contact</option>
<option value="appel">Appel</option>
<option value="presentation">Présentation</option>
<option value="relance">Relance</option>
<option value="balance_test">Balance test</option>
<option value="test_produit">Test produit</option>
<option value="suivi">Suivi</option>
</select>

<br>

<input id="action_prochaine" placeholder="Prochaine action">

<br>

<input type="date" id="date_rappel">

<br>

<button onclick="enregistrerProspect()">Enregistrer</button>

</div>

<h2>Prospects</h2>

<div id="listeProspects"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl="https://xocsmlqmplnmpcfqrnmz.supabase.co"
const supabaseKey="sb_publishable_kQ2NDobwMT9rfJYPYtY0bw_9ZKnf9MU"

const supabaseClient=supabase.createClient(supabaseUrl,supabaseKey)

let prospectEnEdition=null

function ouvrirFormulaire(){

document.getElementById("formulaire").style.display="block"

document.getElementById("nom").value=""
document.getElementById("telephone").value=""
document.getElementById("note").value=""
document.getElementById("pipeline").value="business"
document.getElementById("etape").value="prospection"
document.getElementById("action_prochaine").value=""
document.getElementById("date_rappel").value=""

prospectEnEdition=null

}

async function enregistrerProspect(){

const nom=document.getElementById("nom").value
const telephone=document.getElementById("telephone").value
const note=document.getElementById("note").value
const pipeline=document.getElementById("pipeline").value
const etape=document.getElementById("etape").value
const action=document.getElementById("action_prochaine").value
const date=document.getElementById("date_rappel").value

if(prospectEnEdition){

const {error}=await supabaseClient
.from("contacts")
.update({
nom:nom,
telephone:telephone,
notes:note,
pipeline:pipeline,
etape:etape,
action_prochaine:action,
date_rappel:date
})
.eq("id",prospectEnEdition)

prospectEnEdition=null

if(error){
alert(error.message)
}else{
alert("Prospect modifié")
chargerProspects()
}

}else{

const {error}=await supabaseClient
.from("contacts")
.insert([
{
nom:nom,
telephone:telephone,
notes:note,
pipeline:pipeline,
etape:etape,
action_prochaine:action,
date_rappel:date
}
])

if(error){
alert(error.message)
}else{
alert("Prospect enregistré")
chargerProspects()
}

}

}

async function chargerProspects(){

const {data,error}=await supabaseClient
.from("contacts")
.select("*")

if(error){
console.log(error)
return
}

const zone=document.getElementById("listeProspects")
zone.innerHTML=""

const aujourd=new Date().toISOString().split('T')[0]

data.forEach(prospect=>{

let classe="futur"

if(prospect.date_rappel){

if(prospect.date_rappel<aujourd){
classe="retard"
}
else if(prospect.date_rappel===aujourd){
classe="aujourdhui"
}

}

zone.innerHTML+=`

<div class="carte ${classe}">

<strong>${prospect.nom}</strong><br>

📞 ${prospect.telephone}<br>

Pipeline : ${prospect.pipeline||"non défini"}<br>

Étape : ${prospect.etape||"non définie"}<br>

Action : ${prospect.action_prochaine||"non définie"}<br>

📅 Rappel : ${prospect.date_rappel||"non défini"}<br>

${prospect.notes||""}

<br><br>

<button onclick="modifierProspect('${prospect.id}')">Modifier</button>

<button onclick="actionFaite('${prospect.id}')">Action faite</button>

<a href="https://wa.me/${prospect.telephone}" target="_blank">

<button style="background:#25D366">WhatsApp</button>

</a>

</div>

`

})

}

async function modifierProspect(id){

const {data,error}=await supabaseClient
.from("contacts")
.select("*")
.eq("id",id)
.single()

if(error){
alert("Erreur chargement")
return
}

prospectEnEdition=id

document.getElementById("formulaire").style.display="block"

document.getElementById("nom").value=data.nom
document.getElementById("telephone").value=data.telephone
document.getElementById("note").value=data.notes||""
document.getElementById("pipeline").value=data.pipeline||"business"
document.getElementById("etape").value=data.etape||"prospection"
document.getElementById("action_prochaine").value=data.action_prochaine||""
document.getElementById("date_rappel").value=data.date_rappel||""

}

async function actionFaite(id){

const nouvelleDate=new Date()

nouvelleDate.setDate(nouvelleDate.getDate()+3)

const date=nouvelleDate.toISOString().split('T')[0]

const {error}=await supabaseClient
.from("contacts")
.update({
action_prochaine:"Relancer",
date_rappel:date
})
.eq("id",id)

if(error){
alert(error.message)
}else{
alert("Action enregistrée, relance programmée")
chargerProspects()
}

}

async function voirRappels(){

const aujourd=new Date().toISOString().split('T')[0]

const {data,error}=await supabaseClient
.from("contacts")
.select("*")
.eq("date_rappel",aujourd)

if(error){
console.log(error)
return
}

const zone=document.getElementById("listeProspects")
zone.innerHTML=""

data.forEach(prospect=>{

zone.innerHTML+=`

<div class="carte aujourdhui">

<strong>${prospect.nom}</strong><br>

📞 ${prospect.telephone}<br>

Pipeline : ${prospect.pipeline||""}<br>

Étape : ${prospect.etape||""}<br>

Action : ${prospect.action_prochaine||""}<br>

📅 Rappel : ${prospect.date_rappel||""}<br>

<a href="https://wa.me/${prospect.telephone}" target="_blank">

<button style="background:#25D366">WhatsApp</button>

</a>

</div>

`

})

}

chargerProspects()

</script>

</body>
</html>
