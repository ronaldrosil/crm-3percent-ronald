<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>3% CRM by Ronald</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{color:#3b82f6;}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
}

.btn-orange{background:#f97316;color:white;}
.btn-green{background:#22c55e;color:white;}
.btn-blue{background:#3b82f6;color:white;}

.carte{
background:#1e293b;
padding:15px;
margin:10px;
border-radius:10px;
}

input, textarea{
width:80%;
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

#formulaire{display:none;}

</style>

</head>

<body>

<h1>3% CRM Ronald</h1>

<button class="btn-orange" onclick="ouvrirFormulaire()">Ajouter</button>
<button class="btn-blue" onclick="chargerProspects()">Tous</button>
<button class="btn-green" onclick="voirRappels()">Rappels</button>

<div id="formulaire">

<input id="nom" placeholder="Nom">
<input id="telephone" placeholder="Téléphone">
<textarea id="note" placeholder="Note"></textarea>

<input id="pipeline" placeholder="Pipeline">
<input id="etape" placeholder="Étape">
<input id="action_prochaine" placeholder="Action">

<input type="date" id="date_rappel">

<button onclick="enregistrerProspect()">Valider</button>

</div>

<h2>Prospects</h2>
<div id="listeProspects"></div>

<h2>Fiche</h2>
<div id="ficheContact"></div>

<h2>Rappels</h2>
<div id="listeRappels"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://xocsmlqmplnmpcfqrnmz.supabase.co"
const supabaseKey = "sb_publishable_kQ2NDobwMT9rfJYPYtY0bw_9ZKnf9MU"

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey)


function ouvrirFormulaire(){
document.getElementById("formulaire").style.display="block"
}

async function enregistrerProspect(){

let nom = document.getElementById("nom").value
let telephone = document.getElementById("telephone").value
let note = document.getElementById("note").value
let pipeline = document.getElementById("pipeline").value
let etape = document.getElementById("etape").value
let action = document.getElementById("action_prochaine").value
let date = document.getElementById("date_rappel").value

const { data, error } = await supabase
.from("contacts")
.insert([{
nom,
telephone,
notes: note,
pipeline,
etape,
action_prochaine: action,
date_rappel: date
}])

if(error){
alert(error.message)
}else{
alert("Ajout OK")
chargerProspects()
}

}

async function chargerProspects(){

const { data } = await supabase
.from("contacts")
.select("*")
.order("created_at",{ascending:false})

let zone = document.getElementById("listeProspects")
zone.innerHTML=""

data.forEach(p=>{

zone.innerHTML+=`

<div class="carte">

<b>${p.nom}</b><br>
📞 ${p.telephone}<br>
${p.pipeline || ""} / ${p.etape || ""}<br>

<button onclick="fiche('${p.id}')">Fiche</button>
<button onclick="modifier('${p.id}')">Modifier</button>
<button onclick="whatsapp('${p.telephone}')">WhatsApp</button>

</div>

`

})

}

async function fiche(id){

const { data: c } = await supabase
.from("contacts")
.select("*")
.eq("id",id)
.single()

const { data: i } = await supabase
.from("interactions")
.select("*")
.eq("contact_id",id)
.order("date_interaction",{ascending:false})

let hist=""

i.forEach(x=>{
hist+=<div class="carte">${x.note}</div>
})

document.getElementById("ficheContact").innerHTML=`

<div class="carte">

<h3>${c.nom}</h3>

📞 ${c.telephone}<br>
${c.pipeline}<br>
${c.etape}<br>
${c.action_prochaine}<br>
${c.date_rappel}<br>

<h4>Historique</h4>

${hist}

</div>

`

}

async function modifier(id){

let note = prompt("Nouvelle note")

await supabase
.from("contacts")
.update({notes: note})
.eq("id",id)

await supabase
.from("interactions")
.insert([{contact_id:id,note:note}])

chargerProspects()

}

function whatsapp(num){

window.open(https://wa.me/${num})

}

async function voirRappels(){

let today = new Date().toISOString().split("T")[0]

const { data } = await supabase
.from("contacts")
.select("*")
.eq("date_rappel",today)

let zone = document.getElementById("listeRappels")
zone.innerHTML=""

data.forEach(p=>{

zone.innerHTML+=`

<div class="carte">

${p.nom}<br>
${p.action_prochaine}<br>

</div>

`

})

}

chargerProspects()

</script>

</body>
</html>
